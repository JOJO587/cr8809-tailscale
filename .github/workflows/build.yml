# =============================================================================
# 在 GitHub Actions 上交叉编译 CR8809 用的 Tailscale（单二进制 tailscaled，内嵌 cli，软链 tailscale 复用）
#
# 放置位置：在你的 GitHub 仓库里存为  .github/workflows/build.yml
# 触发方式：仓库 Actions 页 → 选本工作流 → "Run workflow" → version 填 v1.98.9（或留空追最新稳定版）
#
# 关键点（相比上游 tiny-tailscale 的两处改动）：
#   1) 矩阵只编 arm + GOARM=7（= armv7，匹配 CR8809 的 Cortex-A7；上游默认 GOARM=6）
#   2) 守护进程 build tags 用单二进制(ts_include_cli)：--min --add=osrouter,iptables,cli,unixsocketidentity,
#      advertiseroutes,useroutes,relayserver,portmapper（必含 osrouter 否则 daemon 启动即退；unixsocketidentity
#      是 LocalAPI 本地 root 鉴权，缺失则 CLI 全 403；advertiseroutes/useroutes 为 subnet route 必需；
#      relayserver/portmapper 为 DERP 中继兜底+NAT 穿透；netstack(userspace)走 TUN 模式用不到故 omit 省 RAM）。
#      cli 让单一 tailscaled 二进制同时具备 CLI 能力，软链 tailscale->tailscaled 复用，无需独立 CLI 文件。
#
# 构建方式：CGO_ENABLED=0 静态链接 → 零 libc 依赖 → 不依赖路由的 musl 版本（ABI 安全）
# 不需要 OpenWrt SDK、不需要 musl 交叉工具链；ubuntu-latest runner 自带 Go。
# =============================================================================

name: Build pure tailscaled (armv7)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tailscale 版本号（如 v1.98.9）。留空=自动追最新稳定版(even minor)。'
        required: false
        type: string
  # 取消下一行注释可启用「每日 06:00 自动追最新稳定版」
  # schedule:
  #   - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: 解析目标版本
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(gh release list --repo tailscale/tailscale --limit 100 \
            --json tagName --jq '.[].tagName' | \
            grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+$' | \
            awk -F. '$2 % 2 == 0' | \
            sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "未找到稳定版"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "最新稳定版: v${LATEST}"
          EXISTING=$(gh release view "v${LATEST}" \
            --repo "${{ github.repository }}" \
            --json tagName -q .tagName 2>/dev/null || echo "")
          if [ "v${LATEST}" = "${EXISTING}" ]; then
            echo "已构建过 v${LATEST}"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${LATEST}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            goos: linux
            goarch: arm
            goextra: "GOARM=7"      # ← 改动1：armv7（上游默认 GOARM=6）
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取上游 tailscale 并切到目标版本
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git remote add upstream https://github.com/tailscale/tailscale.git || true
          # 清理本仓库可能残留的同名 tag（首次构建的 release 遗留，指向本仓库 main 而非上游 commit），
          # 否则 git fetch upstream tag 会因 "would clobber existing tag" 被拒
          git tag -d "$VERSION" 2>/dev/null || true
          git fetch upstream tag "$VERSION" --no-tags
          git checkout "$VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 生成版本信息
        id: version
        run: |
          eval $(CGO_ENABLED=0 go run ./cmd/mkversion)
          echo "long=${VERSION_LONG}" >> "$GITHUB_OUTPUT"
          echo "short=${VERSION_SHORT}" >> "$GITHUB_OUTPUT"

      - name: 生成 build tags（单二进制 daemon，含 OSRouter + iptables + cli + 本地鉴权）
        id: tags
        run: |
          # 单二进制：ts_include_cli 让 tailscaled 同时具备 CLI 能力（软链 tailscale->tailscaled 复用），
          # 编译为 ./cmd/tailscaled 并带 cli tag 即可，无需独立 CLI 文件。
          # 关键：--min 会 omit 所有 feature（含 netstack+osrouter+unixsocketidentity）。
          #   - osrouter/iptables：TUN 模式 subnet router 必需（系统路由+防火墙），否则 daemon 启动即退；
          #   - unixsocketidentity：LocalAPI 本地 root 鉴权(peercred/SO_PEERCRED)，缺失则 CLI 全 403（已踩坑）；
          #   - advertiseroutes/useroutes：--advertise-routes 子网路由与接受路由必需；
          #   - relayserver/portmapper：DERP 中继兜底 + NAT 穿透，连通性必需。
          #   - ipnbus：进程间通知总线；tailscale up/login 的交互式登录链接靠它推给 CLI 打印，
          #              --min 默认 omit 会导致 "not waiting for completion" 且不显示链接（已踩坑）。GuNanOvO 配方默认保留。
          #   - netstack(userspace)本机走 TUN 模式(kmod-tun 已装、Userspace:false)用不到，故意 omit 省 RAM。
          TAGS=$(CGO_ENABLED=0 go run ./cmd/featuretags \
            --min \
            --add=osrouter,iptables,cli,unixsocketidentity,advertiseroutes,useroutes,relayserver,portmapper,ipnbus)
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Build tags: ${TAGS}"

      - name: 编译单二进制 tailscaled（常驻守护进程，内嵌 cli）
        run: |
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          if [ -n "${{ matrix.goextra }}" ]; then
            export ${{ matrix.goextra }}
          fi
          go build -o tailscaled -trimpath \
            -tags "${{ steps.tags.outputs.tags }}" \
            -ldflags "-s -w \
              -X tailscale.com/version.longStamp=${{ steps.version.outputs.long }} \
              -X tailscale.com/version.shortStamp=${{ steps.version.outputs.short }}" \
            ./cmd/tailscaled

      - name: 打包
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          VERSION="${VERSION#v}"
          DIR="tailscale-armv7_${VERSION}"
          mkdir "$DIR"
          mv tailscaled "$DIR/"
          tar czf "${DIR}.tgz" "$DIR"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-armv7-${{ steps.version.outputs.short }}
          path: tailscale-armv7_*.tgz

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tailscale-armv7-*
          merge-multiple: true
      - name: 发布到 Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          # 幂等重建：先删旧 release，再删旧 tag（否则 gh release create 在同名已存在 tag 上会冲突
          # "a release with the same tag name already exists"）。删 tag 用 API（release job 无 checkout，
          # 不能用 git push --delete）。
          gh release delete "${VERSION}" -y 2>/dev/null || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${VERSION}" 2>/dev/null || true
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "tailscale-armv7 ${VERSION}" \
            --notes "单二进制 tailscaled(内嵌 cli, 软链 tailscale->tailscaled 复用；含 OSRouter+iptables+unixsocketidentity 本地鉴权+subnet route+DERP/NAT 穿透)，ARMv7(GOARM=7) 静态链接(CGO_ENABLED=0)，用于 CR8809(OpenWrt 21.02.7)。" \
            artifacts/tailscale-armv7_*.tgz
