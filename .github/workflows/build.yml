# =============================================================================
# 在 GitHub Actions 上交叉编译 CR8809 用的 Tailscale（纯 tailscaled + 独立 CLI）
#
# 放置位置：在你的 GitHub 仓库里存为  .github/workflows/build.yml
# 触发方式：仓库 Actions 页 → 选本工作流 → "Run workflow" → version 填 v1.98.9（或留空追最新稳定版）
#
# 关键点（相比上游 tiny-tailscale 的两处改动）：
#   1) 矩阵只编 arm + GOARM=7（= armv7，匹配 CR8809 的 Cortex-A7；上游默认 GOARM=6）
#   2) 守护进程 build tags 用 --min --add=osrouter,iptables（必含 osrouter，否则 daemon 启动即退）
#      另单独编一个带 cli 的 tailscale 二进制，留作 /tmp 临时配置用（见方案文档 §12.5）
#
# 构建方式：CGO_ENABLED=0 静态链接 → 零 libc 依赖 → 不依赖路由的 musl 版本（ABI 安全）
# 不需要 OpenWrt SDK、不需要 musl 交叉工具链；ubuntu-latest runner 自带 Go。
# =============================================================================

name: Build pure tailscaled (armv7)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tailscale 版本号（如 v1.98.9）。留空=自动追最新稳定版(even minor)。'
        required: false
        type: string
  # 取消下一行注释可启用「每日 06:00 自动追最新稳定版」
  # schedule:
  #   - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: 解析目标版本
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(gh release list --repo tailscale/tailscale --limit 100 \
            --json tagName --jq '.[].tagName' | \
            grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+$' | \
            awk -F. '$2 % 2 == 0' | \
            sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "未找到稳定版"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "最新稳定版: v${LATEST}"
          EXISTING=$(gh release view "v${LATEST}" \
            --repo "${{ github.repository }}" \
            --json tagName -q .tagName 2>/dev/null || echo "")
          if [ "v${LATEST}" = "${EXISTING}" ]; then
            echo "已构建过 v${LATEST}"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${LATEST}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv7
            goos: linux
            goarch: arm
            goextra: "GOARM=7"      # ← 改动1：armv7（上游默认 GOARM=6）
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取上游 tailscale 并切到目标版本
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git remote add upstream https://github.com/tailscale/tailscale.git || true
          git fetch upstream tag "$VERSION" --no-tags
          git checkout "$VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 生成版本信息
        id: version
        run: |
          eval $(CGO_ENABLED=0 go run ./cmd/mkversion)
          echo "long=${VERSION_LONG}" >> "$GITHUB_OUTPUT"
          echo "short=${VERSION_SHORT}" >> "$GITHUB_OUTPUT"

      - name: 生成 build tags（守护进程，含 OSRouter + iptables）
        id: tags
        run: |
          # 守护进程必须含 osrouter（系统路由/DNS 配置器，否则 daemon 启动即退）；
          # --min 会 omit 所有 feature（含 netstack+osrouter）仅用于 benchmark，
          # 故用 --add=osrouter,iptables 补回必需组件。netstack(userspace)本机走 TUN 模式用不到，不加更省体积。
          TAGS=$(CGO_ENABLED=0 go run ./cmd/featuretags \
            --min \
            --add=osrouter,iptables)
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Build tags: ${TAGS}"

      - name: 编译纯 tailscaled（常驻守护进程，无 CLI）
        run: |
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          if [ -n "${{ matrix.goextra }}" ]; then
            export ${{ matrix.goextra }}
          fi
          go build -o tailscaled -trimpath \
            -tags "${{ steps.tags.outputs.tags }}" \
            -ldflags "-s -w \
              -X tailscale.com/version.longStamp=${{ steps.version.outputs.long }} \
              -X tailscale.com/version.shortStamp=${{ steps.version.outputs.short }}" \
            ./cmd/tailscaled

      - name: 编译 tailscale CLI（独立二进制，/tmp 临时配置用）
        run: |
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          if [ -n "${{ matrix.goextra }}" ]; then
            export ${{ matrix.goextra }}
          fi
          # CLI 二进制的 tags 必须显式 --add=cli（featuretags 才会输出 ts_include_cli 并保留其依赖）；
          # 不能复用 daemon 的 tags 后硬拼 ",cli"（cli 不是合法 build tag，会导致 CLI 功能缺失/编译异常）
          # 注意：featuretags 是给 runner(amd64) 本地执行的小工具，必须强制 GOARCH=amd64，
          # 否则会被上面 export 的 GOARCH=arm 污染、交叉编译成 arm 后在 x86 runner 上 exec format error（已踩坑）。
          CLI_TAGS=$(CGO_ENABLED=0 GOARCH=amd64 GOARM= go run ./cmd/featuretags --min --add=osrouter,iptables,cli)
          echo "CLI build tags: ${CLI_TAGS}"
          go build -o tailscale -trimpath \
            -tags "${CLI_TAGS}" \
            -ldflags "-s -w \
              -X tailscale.com/version.longStamp=${{ steps.version.outputs.long }} \
              -X tailscale.com/version.shortStamp=${{ steps.version.outputs.short }}" \
            ./cmd/tailscale

      - name: 打包
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          VERSION="${VERSION#v}"
          DIR="tailscale-armv7_${VERSION}"
          mkdir "$DIR"
          mv tailscaled "$DIR/"
          mv tailscale "$DIR/"
          tar czf "${DIR}.tgz" "$DIR"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-armv7-${{ steps.version.outputs.short }}
          path: tailscale-armv7_*.tgz

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tailscale-armv7-*
          merge-multiple: true
      - name: 发布到 Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "tailscale-armv7 ${VERSION}" \
            --notes "纯 tailscaled（无 CLI）+ 独立 tailscale CLI，ARMv7(GOARM=7) 静态链接(CGO_ENABLED=0)，用于 CR8809(OpenWrt 21.02.7)。" \
            artifacts/tailscale-armv7_*.tgz
